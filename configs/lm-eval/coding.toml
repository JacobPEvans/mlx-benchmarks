# lm_eval coding benchmark
# Tasks: humaneval_instruct (164 problems, code execution), mbpp_instruct (374 problems, text match)
# Run with HF_ALLOW_CODE_EVAL=1
model = "local-chat-completions"
tasks = ["humaneval_instruct", "mbpp_instruct"]
batch_size = 1
num_fewshot = 0
apply_chat_template = true
fewshot_as_multiturn = true

[model_args]
base_url = "http://localhost:11434/v1/chat/completions"
# model injected per-sweep
max_length = 32768
timeout = 3600
