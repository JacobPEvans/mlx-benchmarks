name: validate-schema

on:
  pull_request:
    paths:
      - schema.json
      - configs/**
      - .github/workflows/validate-schema.yml
  push:
    branches: [main]
    paths:
      - schema.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Validate schema.json is a valid Draft-07 JSON Schema
        run: |
          uvx --with 'jsonschema==4.23.0' python - <<'PY'
          import json
          from jsonschema import Draft7Validator
          schema = json.loads(open("schema.json").read())
          Draft7Validator.check_schema(schema)
          print("schema.json is a valid Draft-07 JSON Schema")
          print(f"  title: {schema.get('title')}")
          print(f"  properties: {sorted(schema.get('properties', {}).keys())}")
          PY

      - name: Validate TOML configs parse
        run: |
          uvx --with 'tomli==2.2.1' python - <<'PY'
          import sys
          import tomli
          from pathlib import Path
          errors = []
          for p in sorted(Path("configs").rglob("*.toml")):
              try:
                  tomli.loads(p.read_text())
                  print(f"ok: {p}")
              except tomli.TOMLDecodeError as e:
                  errors.append(f"{p}: {e}")
          if errors:
              print("\nErrors:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          PY
