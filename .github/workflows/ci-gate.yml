# CI Gate — Conditional Required Checks
#
# Single merge-blocking workflow following the org-wide pattern
# (see JacobPEvans/ai-workflows and JacobPEvans/nix-*).
#
# Change detection runs first; each downstream job is conditional on the
# relevant file categories. The final "Merge Gate" job aggregates all
# results via re-actors/alls-green and is the ONLY check that should be
# marked required in branch protection.
#
# To add a new check:
#   1. (Shared check) create a reusable workflow in JacobPEvans/.github
#      and call it from here.
#   2. Add a filter pattern under `changes.steps.filter.with.filters`.
#   3. Add the job with appropriate `if:` condition.
#   4. Append the job name to `gate.needs` and `allowed-skips`.

name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      markdown: ${{ steps.filter.outputs.markdown }}
      schema: ${{ steps.filter.outputs.schema }}
      publisher: ${{ steps.filter.outputs.publisher }}
      lockfile: ${{ steps.filter.outputs.lockfile }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'scripts/**'
              - 'space/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci-gate.yml'
            markdown:
              - '**.md'
              - '.markdownlint*'
            schema:
              - 'schema.json'
              - 'configs/**'
              - 'scripts/validate_schema.py'
            publisher:
              - 'src/mlx_benchmarks/**'
              - 'scripts/publish_run.py'
              - 'schema.json'
              - 'tests/fixtures/**'
              - 'pyproject.toml'
            lockfile:
              - 'uv.lock'
              - 'pyproject.toml'

  python-test:
    name: Python Test
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install project + dev dependencies
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          uv venv --python "$PYTHON_VERSION"
          uv pip install -e ".[viewer]"
          uv pip install mypy pytest pytest-cov ruff types-jsonschema types-psutil
      - name: Ruff lint
        run: .venv/bin/ruff check .
      - name: Ruff format check
        run: .venv/bin/ruff format --check .
      - name: Mypy strict
        run: .venv/bin/mypy src/mlx_benchmarks
      - name: Pytest (package)
        run: .venv/bin/pytest tests --cov=mlx_benchmarks --cov-report=term
      - name: Pytest (space viewer)
        run: .venv/bin/pytest space/tests

  python-security:
    name: Python Security
    needs: changes
    if: needs.changes.outputs.lockfile == 'true'
    uses: JacobPEvans/.github/.github/workflows/_python-security.yml@main
    with:
      python-dirs: "."
      # Acknowledged transitive vulnerabilities with no upstream fix.
      # Each ID MUST link to a tracking issue and be reviewed quarterly.
      #   GHSA-g4r7-86gm-pgqc — sqlitedict 2.1.0 (CVE-2024-35515),
      #     pulled in transitively by lm-eval[api]==0.4.11. Tracked in #18.
      #     Risk: insecure deserialization of local pickle data; only
      #     loaded by lm-eval's caching layer for files we control.
      ignore-vulns: "GHSA-g4r7-86gm-pgqc"

  osv-scan:
    name: OSV Scan
    needs: changes
    if: needs.changes.outputs.lockfile == 'true'
    uses: JacobPEvans/.github/.github/workflows/_osv-scan.yml@main

  markdown-lint:
    name: Markdown Lint
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    uses: JacobPEvans/.github/.github/workflows/_markdown-lint.yml@main

  file-size:
    name: File Size
    needs: changes
    uses: JacobPEvans/.github/.github/workflows/_file-size.yml@main

  schema-validate:
    name: Schema Validate
    needs: changes
    if: needs.changes.outputs.schema == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install validator deps
        run: python -m pip install --no-cache-dir "jsonschema[format]>=4.23.0"
      - name: Validate schema + TOML configs
        run: python scripts/validate_schema.py

  dry-run-publish:
    name: Dry-run publish
    needs: changes
    if: needs.changes.outputs.publisher == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Build wheel
        run: |
          uv venv .venv-build --python 3.11
          uv pip install --python .venv-build/bin/python build
          .venv-build/bin/python -m build --wheel --outdir dist/
      - name: Install built wheel in a clean venv
        run: |
          uv venv .venv-install --python 3.11
          uv pip install --python .venv-install/bin/python dist/*.whl
      - name: Dry-run publish against canonical fixture
        run: |
          .venv-install/bin/mlx-bench-publish \
            tests/fixtures/lm_eval_results_sample.json \
            --kind lm-eval \
            --suite reasoning \
            --git-sha "${COMMIT_SHA:0:7}" \
            --dry-run

  gate:
    name: Merge Gate
    needs:
      - changes
      - python-test
      - python-security
      - osv-scan
      - markdown-lint
      - file-size
      - schema-validate
      - dry-run-publish
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check all results
        uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: python-test, python-security, osv-scan, markdown-lint, schema-validate, dry-run-publish
          jobs: ${{ toJSON(needs) }}
