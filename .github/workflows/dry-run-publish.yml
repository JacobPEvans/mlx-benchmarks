name: dry-run-publish

on:
  pull_request:
    paths:
      - src/mlx_benchmarks/**
      - scripts/publish_run.py
      - schema.json
      - tests/fixtures/**
      - pyproject.toml
      - .github/workflows/dry-run-publish.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dry-run-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build wheel
        run: |
          uv venv --python 3.11
          uv pip install build
          uv run --no-project python -m build --wheel --outdir dist/

      - name: Install built wheel in a clean venv
        run: |
          uv venv .venv-install --python 3.11
          .venv-install/bin/pip install dist/*.whl

      - name: Dry-run publish against canonical fixture (from built wheel)
        run: |
          .venv-install/bin/mlx-bench-publish \
            tests/fixtures/lm_eval_results_sample.json \
            --kind lm-eval \
            --suite reasoning \
            --git-sha "${COMMIT_SHA:0:7}" \
            --dry-run
