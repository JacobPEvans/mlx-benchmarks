name: deploy-space

on:
  push:
    branches: [main]
    paths:
      - space/**
      - .github/workflows/deploy-space.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-space
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: huggingface-space
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install huggingface_hub
        run: python -m pip install --no-cache-dir "huggingface_hub[cli]>=0.30"

      - name: Upload space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GIT_SHA: ${{ github.sha }}
        run: |
          huggingface-cli upload JacobPEvans/mlx-benchmarks-viewer ./space . \
            --repo-type=space \
            --commit-message="Deploy from ${GIT_SHA}" \
            --exclude=".venv/**" \
            --exclude="__pycache__/**" \
            --exclude=".pytest_cache/**" \
            --exclude=".ruff_cache/**" \
            --exclude=".mypy_cache/**" \
            --exclude="tests/**"
