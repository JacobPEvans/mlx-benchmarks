name: deploy-space

on:
  push:
    branches: [main]
    paths:
      - space/**
      - .github/workflows/deploy-space.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-space
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: huggingface-space
    env:
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: python -m pip install --no-cache-dir "huggingface_hub>=0.23"

      - name: Push space to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_REPO_ID: JacobPEvans/mlx-benchmarks-viewer
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/deploy_space.py
