name: Bug report
description: Something in the harness, publisher, or viewer behaves incorrectly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the bug report. Please include enough detail that we can reproduce locally.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands, config paths, and any minimal fixture.
      placeholder: |
        1. `.venv/bin/mlx-bench-publish ... --dry-run`
        2. Expected: schema validation passes
        3. Actual: EnvelopeValidationError on `system.memory_gb`
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `git rev-parse --short HEAD` and `.venv/bin/python -c "import mlx_benchmarks; print(mlx_benchmarks.__version__)"`
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: macOS version + chip, or CI runner label.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output (CLI with `--log-format json` preferred).
      render: shell
