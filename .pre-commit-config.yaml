repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        # lm-eval task configs (configs/lm-eval/qwen3-tasks/*.yaml) use
        # custom !function tags. --unsafe runs a syntax-only check that
        # accepts custom tags while still validating YAML structure.
        args: [--unsafe]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '^(uv\.lock|.*\.parquet)$'
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^src/mlx_benchmarks/
        # NOTE: pyarrow is intentionally NOT in additional_dependencies.
        # pyarrow ships no type stubs (no py.typed marker), so when it's
        # installed the only way to silence no-untyped-call on pq.write_table
        # is via a per-line `# type: ignore`, which then trips
        # warn_unused_ignores against the local venv's typed-ish read of
        # pyarrow. Leaving it out lets mypy treat pyarrow as a missing
        # import and the [tool.mypy.overrides] ignore_missing_imports=true
        # rule applies cleanly to both pre-commit and local runs.
        additional_dependencies:
          - jsonschema>=4.23.0
          - types-jsonschema
          - types-psutil

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint

default_language_version:
  python: python3

ci:
  autoupdate_schedule: monthly
